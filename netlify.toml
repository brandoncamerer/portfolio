# Netlify configuration for Brandon Camerer Portfolio

[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "18"
NPM_VERSION = "9"

# Redirect rules for React Router (SPA)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache configuration for assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

[functions]
  directory = "netlify/functions"
